<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8">
<script>document.documentElement.dataset.fmt=new URLSearchParams(location.search).get('fmt')||'1x1';</script>
<link rel="stylesheet" href="inter-embed.css"><link rel="stylesheet" href="shared.css">
<style>
.stage{background:var(--cream);color:var(--ink);padding:88px;justify-content:space-between;align-items:stretch}
.bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.bg__glow{position:absolute;width:820px;height:820px;border-radius:50%;top:-300px;left:-260px;
  background:radial-gradient(circle,rgba(127,176,105,.22) 0%,rgba(127,176,105,0) 70%)}
.bg__glow2{position:absolute;width:760px;height:760px;border-radius:50%;bottom:-320px;right:-260px;
  background:radial-gradient(circle,rgba(217,164,65,.16) 0%,rgba(217,164,65,0) 72%)}
.stage>*{position:relative;z-index:1}
.brand__mark{width:60px;height:60px}
.brand__name{font-size:40px;color:var(--green-deep)}
.brand__sub{font-size:22px;color:var(--ink-soft)}

.mid{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:44px;text-align:center}
.art{width:560px;height:auto}
.headline{font-size:78px;font-weight:800;letter-spacing:-.025em;line-height:1.02;color:var(--green-deep);max-width:920px}
.headline em{font-style:normal;color:var(--gold-deep)}

.foot{display:flex;flex-direction:column;gap:32px;align-items:center}
.chip{background:var(--white);border:1.5px solid var(--cream-dark);color:var(--ink);font-size:27px;
  box-shadow:0 6px 22px rgba(29,92,77,.07)}
.url{font-size:31px;color:var(--green-deep)}
.url__arrow{width:52px;height:52px;background:var(--green-deep);color:var(--cream);font-size:26px}

html[data-fmt="4x5"] .art{width:600px}
html[data-fmt="4x5"] .headline{font-size:86px}
html[data-fmt="4x5"] .mid{gap:56px}

html[data-fmt="9x16"] .stage{padding:150px 92px}
html[data-fmt="9x16"] .art{width:680px}
html[data-fmt="9x16"] .headline{font-size:98px;max-width:100%}
html[data-fmt="9x16"] .mid{gap:72px}
html[data-fmt="9x16"] .chip{font-size:32px;padding:18px 30px}
html[data-fmt="9x16"] .url{font-size:38px}
html[data-fmt="9x16"] .brand__name{font-size:46px}
</style></head>
<body>
<div class="stage">
  <div class="bg"><div class="bg__glow"></div><div class="bg__glow2"></div></div>

  <div class="brand">
    <svg class="brand__mark" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="31" fill="#1d5c4d"/>
      <path d="M18 20 L32 46 L46 20" stroke="#faf7f2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M40 15 C46 21 46 29 40 34" stroke="#7fb069" stroke-width="5" stroke-linecap="round" fill="none"/>
    </svg>
    <div><div class="brand__name">Hälsoklubben</div><div class="brand__sub">Månadens dragning</div></div>
  </div>

  <div class="mid">
    <svg class="art" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#1d5c4d"/><stop offset="1" stop-color="#144238"/>
        </linearGradient>
        <radialGradient id="badge" cx="0.5" cy="0.4" r="0.75">
          <stop offset="0" stop-color="#ecc063"/><stop offset="1" stop-color="#d9a441"/>
        </radialGradient>
      </defs>
      <!-- gift card -->
      <g transform="rotate(-6 250 250)">
        <rect x="66" y="150" width="368" height="224" rx="26" fill="url(#card)"/>
        <rect x="66" y="150" width="368" height="224" rx="26" fill="none" stroke="#ffffff" stroke-opacity=".10" stroke-width="2"/>
        <!-- ribbon -->
        <rect x="232" y="150" width="38" height="224" fill="#7fb069" fill-opacity=".92"/>
        <rect x="66" y="243" width="368" height="36" fill="#7fb069" fill-opacity=".92"/>
        <!-- bow -->
        <circle cx="251" cy="261" r="14" fill="#8cbf78"/>
        <path d="M251 261 C224 236 207 244 217 262 C207 280 224 288 251 261Z" fill="#8cbf78"/>
        <path d="M251 261 C278 236 295 244 285 262 C295 280 278 288 251 261Z" fill="#8cbf78"/>
        <text x="102" y="200" fill="#faf7f2" fill-opacity=".85" font-family="Inter" font-size="18" font-weight="700" letter-spacing="3">PRESENTKORT</text>
      </g>
      <!-- gold starburst badge, top-right, minimal overlap -->
      <g transform="translate(486 104)">
        <g stroke="#d9a441" stroke-width="7" stroke-linecap="round">
          <line x1="0" y1="-124" x2="0" y2="-106"/><line x1="0" y1="124" x2="0" y2="106"/>
          <line x1="-124" y1="0" x2="-106" y2="0"/><line x1="124" y1="0" x2="106" y2="0"/>
          <line x1="-88" y1="-88" x2="-75" y2="-75"/><line x1="88" y1="88" x2="75" y2="75"/>
          <line x1="-88" y1="88" x2="-75" y2="75"/><line x1="88" y1="-88" x2="75" y2="-75"/>
        </g>
        <circle cx="0" cy="0" r="100" fill="url(#badge)"/>
        <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-opacity=".6" stroke-width="2.5" stroke-dasharray="2 11"/>
        <text x="0" y="-18" text-anchor="middle" fill="#144238" font-family="Inter" font-size="57" font-weight="900" letter-spacing="-1">10&#8201;000</text>
        <text x="0" y="20" text-anchor="middle" fill="#144238" font-family="Inter" font-size="33" font-weight="800">kr</text>
        <text x="0" y="56" text-anchor="middle" fill="#144238" fill-opacity=".82" font-family="Inter" font-size="15.5" font-weight="700" letter-spacing="2.5">TILL MATKASSEN</text>
      </g>
    </svg>

    <div class="headline">Tävla om <em>10&thinsp;000 kr</em><br>till matkassen</div>
  </div>

  <div class="foot">
    <div class="chips">
      <span class="chip"><span class="chip__dot"></span>4 frågor</span>
      <span class="chip"><span class="chip__dot"></span>1 minut</span>
      <span class="chip"><span class="chip__dot"></span>Gratis att delta</span>
    </div>
    <div class="url"><span class="url__arrow">→</span>halsoklubben.vivanord.se</div>
  </div>
</div>
</body></html>

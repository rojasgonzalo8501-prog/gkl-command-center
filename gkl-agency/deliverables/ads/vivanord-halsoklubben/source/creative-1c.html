<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8">
<script>document.documentElement.dataset.fmt=new URLSearchParams(location.search).get('fmt')||'1x1';</script>
<link rel="stylesheet" href="inter-embed.css"><link rel="stylesheet" href="shared.css">
<style>
.stage{background:var(--green-deep);color:var(--cream);padding:84px;justify-content:space-between}
.bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.bg__glow{position:absolute;width:900px;height:900px;border-radius:50%;top:-320px;right:-280px;
  background:radial-gradient(circle,rgba(127,176,105,.42) 0%,rgba(127,176,105,0) 68%)}
.bg__glow2{position:absolute;width:820px;height:820px;border-radius:50%;bottom:-360px;left:-300px;
  background:radial-gradient(circle,rgba(217,164,65,.20) 0%,rgba(217,164,65,0) 70%)}
.bg__rings{position:absolute;inset:0;opacity:.06;
  background:repeating-radial-gradient(circle at 82% 14%,transparent 0 78px,#fff 78px 80px)}
.stage>*{position:relative;z-index:1}
.brand__mark{width:60px;height:60px}
.brand__name{font-size:40px;color:var(--cream)}
.brand__sub{font-size:22px;color:var(--cream)}

.hero{display:flex;flex-direction:column;gap:10px}
.kicker{font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:24px;
  color:var(--green-sage);margin-bottom:26px}
.hero__l1{font-size:104px;font-weight:800;letter-spacing:-.03em;line-height:.98;color:var(--cream)}
.hero__l2{font-size:188px;font-weight:900;letter-spacing:-.04em;line-height:.9;color:var(--gold)}
.support{font-size:36px;font-weight:500;line-height:1.32;color:rgba(250,247,242,.86);max-width:840px;margin-top:38px}

.foot{display:flex;flex-direction:column;gap:34px}
.chip{background:rgba(250,247,242,.10);border:1.5px solid rgba(250,247,242,.22);color:var(--cream);font-size:27px}
.url{font-size:31px;color:var(--cream)}
.url__arrow{width:52px;height:52px;background:var(--gold);color:var(--green-dark);font-size:26px}

/* 4:5 */
html[data-fmt="4x5"] .stage{padding:100px 88px}
html[data-fmt="4x5"] .hero__l1{font-size:118px}
html[data-fmt="4x5"] .hero__l2{font-size:212px}
html[data-fmt="4x5"] .support{font-size:39px;max-width:900px}

/* 9:16 */
html[data-fmt="9x16"] .stage{padding:150px 92px}
html[data-fmt="9x16"] .kicker{font-size:28px;margin-bottom:40px}
html[data-fmt="9x16"] .hero__l1{font-size:128px}
html[data-fmt="9x16"] .hero__l2{font-size:236px}
html[data-fmt="9x16"] .support{font-size:44px;max-width:100%;margin-top:54px}
html[data-fmt="9x16"] .chip{font-size:32px;padding:18px 30px}
html[data-fmt="9x16"] .url{font-size:38px}
html[data-fmt="9x16"] .brand__name{font-size:46px}
</style></head>
<body>
<div class="stage">
  <div class="bg"><div class="bg__rings"></div><div class="bg__glow"></div><div class="bg__glow2"></div></div>

  <div class="brand">
    <svg class="brand__mark" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="31" fill="#faf7f2"/>
      <path d="M18 20 L32 46 L46 20" stroke="#1d5c4d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M40 15 C46 21 46 29 40 34" stroke="#7fb069" stroke-width="5" stroke-linecap="round" fill="none"/>
    </svg>
    <div><div class="brand__name">Hälsoklubben</div><div class="brand__sub">Månadens dragning</div></div>
  </div>

  <div class="hero">
    <div class="kicker">Månadens dragning är öppen</div>
    <div class="hero__l1">4 frågor.</div>
    <div class="hero__l2">10&thinsp;000 kr.</div>
    <div class="support">Svara på fyra snabba hälsofrågor och var med i utlottningen av ett presentkort till valfri matbutik.</div>
  </div>

  <div class="foot">
    <div class="chips">
      <span class="chip"><span class="chip__dot"></span>Gratis att delta</span>
      <span class="chip"><span class="chip__dot"></span>Tar under en minut</span>
      <span class="chip"><span class="chip__dot"></span>Ny vinnare varje månad</span>
    </div>
    <div class="url"><span class="url__arrow">→</span>halsoklubben.vivanord.se</div>
  </div>
</div>
</body></html>
